  /sys_im/chat:
    get:
      consumes:
      - application/json
      description: 建立 IM 聊天室 WebSocket 连接。可选传 token 鉴权：有 token 且有效则显示登录用户昵称和头像，无 token
        为游客。nickName 为纯昵称如 小王、游客；会话唯一性由 loginId、connId 区分。连接后通过 JSON 消息交互：<br/>客户端→服务端：join(roomId)、leave(roomId)、message(roomId,content)；<br/>服务端→客户端：message、joined、left、error、online(成员上线广播)、offline(成员下线广播)
      parameters:
      - description: 鉴权 token（可选），有则显示用户昵称，无则为游客
        in: query
        name: token
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols，升级为 WebSocket
          schema:
            type: string
        "400":
          description: 非 WebSocket 升级请求
          schema:
            type: string
      summary: IM 聊天室 WebSocket
      tags:
      - SysImApi
